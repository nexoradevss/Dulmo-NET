<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolmus NET</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#F5F7FA;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.lang-bar{display:flex;gap:8px;margin-bottom:24px}
.lang-btn{padding:8px 16px;border:2px solid #1E88E5;border-radius:20px;background:white;color:#1E88E5;font-size:14px;cursor:pointer;font-weight:600}
.lang-btn.active{background:#1E88E5;color:white}
.container{text-align:center;max-width:400px;width:100%}
.logo{font-size:48px;margin-bottom:8px}
h1{font-size:24px;font-weight:bold;color:#1E88E5;margin-bottom:8px}
p{font-size:14px;color:#888;margin-bottom:32px}
.btn{display:block;width:100%;padding:18px;border-radius:14px;font-size:17px;font-weight:bold;text-decoration:none;margin-bottom:16px}
.btn-passenger{background:#1E88E5;color:white}
.btn-driver{background:#2E7D32;color:white}
</style>
</head>
<body>
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('ar')">العربية</button>
  <button class="lang-btn" onclick="setLang('tr')">Türkçe</button>
  <button class="lang-btn" onclick="setLang('en')">English</button>
</div>
<div class="container">
  <div class="logo">🚌</div>
  <h1 id="title">Dolmus NET</h1>
  <p id="subtitle">اختر نوع الاستخدام</p>
  <a id="btn-passenger" href="passenger.html" class="btn btn-passenger">🧍 واجهة الراكب</a>
  <a id="btn-driver" href="https://github.com/mohamadyuonsos-beep/Dulmo-NET/raw/main/app-debug.apk" class="btn btn-driver">🚗 تطبيق السائق</a>
</div>
<script>
const t={
  ar:{title:"Dolmus NET",subtitle:"اختر نوع الاستخدام",passenger:"🧍 واجهة الراكب",driver:"🚗 تطبيق السائق",dir:"rtl"},
  tr:{title:"Dolmus NET",subtitle:"Kullanım türünü seçin",passenger:"🧍 Yolcu Arayüzü",driver:"🚗 Sürücü Uygulaması",dir:"ltr"},
  en:{title:"Dolmus NET",subtitle:"Choose usage type",passenger:"🧍 Passenger Interface",driver:"🚗 Driver App",dir:"ltr"}
}
function setLang(lang){
  document.getElementById('title').textContent=t[lang].title
  document.getElementById('subtitle').textContent=t[lang].subtitle
  document.getElementById('btn-passenger').textContent=t[lang].passenger
  document.getElementById('btn-driver').textContent=t[lang].driver
  document.documentElement.dir=t[lang].dir
  document.documentElement.lang=lang
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'))
  event.target.classList.add('active')
}
</script>
</body>
</html>
