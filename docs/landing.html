<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dolmus NET</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .lang-bar { display: flex; gap: 8px; margin-bottom: 32px; }
  .lang-btn {
    padding: 8px 16px;
    border: 2px solid #1E88E5;
    border-radius: 20px;
    background: white;
    color: #1E88E5;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
  }
  .lang-btn.active { background: #1E88E5; color: white; }
  h1 { font-size: 22px; color: #1E88E5; margin-bottom: 32px; text-align: center; }
  .btn {
    display: block;
    width: 100%;
    max-width: 320px;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    margin-bottom: 16px;
    text-decoration: none;
  }
  .btn-passenger { background: #1E88E5; color: white; }
  .btn-driver { background: #2E7D32; color: white; }
</style>
</head>
<body>
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('ar')">العربية</button>
  <button class="lang-btn" onclick="setLang('tr')">Türkçe</button>
  <button class="lang-btn" onclick="setLang('en')">English</button>
</div>
<h1 id="title">مرحباً بك في Dolmus NET</h1>
<a class="btn btn-passenger" id="btn-passenger" href="https://mohamadyuonsos-beep.github.io/Dulmo-NET/">🧑 صفحة الراكب</a>
<a class="btn btn-driver" id="btn-driver" href="https://mohamadyuonsos-beep.github.io/Dulmo-NET/app-debug.apk">🚌 تحميل تطبيق السائق</a>
<script>
const texts = {
  ar: { title: "مرحباً بك في Dolmus NET", passenger: "🧑 صفحة الراكب", driver: "🚌 تحميل تطبيق السائق" },
  tr: { title: "Dolmus NET'e Hoş Geldiniz", passenger: "🧑 Yolcu Sayfası", driver: "🚌 Sürücü Uygulamasını İndir" },
  en: { title: "Welcome to Dolmus NET", passenger: "🧑 Passenger Page", driver: "🚌 Download Driver App" }
}
function setLang(lang) {
  document.getElementById('title').textContent = texts[lang].title
  document.getElementById('btn-passenger').textContent = texts[lang].passenger
  document.getElementById('btn-driver').textContent = texts[lang].driver
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'))
  event.target.classList.add('active')
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr'
}
</script>
</body>
</html>
