<style>
:root{
  --blue:#1565C0;--blue-mid:#1E88E5;--blue-light:#E3F2FD;
  --green:#2E7D32;--green-light:#E8F5E9;
  --amber:#E65100;--amber-light:#FFF3E0;
  --red:#C62828;--red-light:#FFEBEE;
  --bg:#F0F4F8;--card:#fff;--border:#CFD8DC;
  --text:#1A2332;--muted:#607D8B;
  --r:14px;--shadow:0 2px 14px rgba(21,101,192,.1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Cairo',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
.bus-marker-icon{background:transparent!important;border:none!important;}
.hdr{background:var(--blue);padding:8px 14px;color:#fff;display:flex;align-items:center;gap:10px}
.hdr-logo{font-size:20px}
.hdr-title{flex:1}
.hdr-title h1{font-size:16px;font-weight:700}
.hdr-loc-btn{background:#FFA000;color:#fff;border:none;border-radius:10px;padding:6px 14px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.hdr-loc-btn.ok{background:#2E7D32}
.hdr-loc-btn.loading{background:#E65100}
.hdr-loc-btn.err{background:#C62828}
.hdr-cancel-btn{background:rgba(255,255,255,0.2);color:#fff;border:1.5px solid rgba(255,255,255,0.5);border-radius:10px;padding:6px 12px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;display:none}
.hdr-cancel-btn.show{display:block}
.lang-select{background:rgba(255,255,255,0.15);color:#fff;border:1.5px solid rgba(255,255,255,0.4);border-radius:8px;padding:4px 6px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;outline:none}
.lang-select option{color:#1A2332;background:#fff}
.wrap{max-width:520px;margin:0 auto;padding:0 10px 30px}
.card{background:var(--card);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px}
#map{height:520px;border-radius:12px;border:1.5px solid var(--border);overflow:hidden;z-index:0}
.routes-grid{display:flex;flex-direction:column;gap:5px}
.route-btn{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:10px;border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:.2s;width:100%;font-family:'Cairo',sans-serif}
.route-btn:hover{border-color:var(--blue-mid);background:var(--blue-light)}
.route-btn.active{border-color:var(--blue);background:var(--blue-light);box-shadow:0 0 0 3px rgba(30,136,229,.15)}
.route-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.route-btn-info{flex:1;text-align:right}
.route-btn-name{font-size:13px;font-weight:700;color:var(--text)}
.route-btn-meta{font-size:11px;color:var(--muted);margin-top:0}
.route-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;white-space:nowrap;flex-shrink:0}
.rb-active{background:var(--green-light);color:var(--green)}
.rb-idle{background:#ECEFF1;color:var(--muted)}
.bus-row{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:11px;padding:7px 10px;margin-bottom:6px}
.bus-icon{font-size:18px;flex-shrink:0}
.bus-body{flex:1}
.bus-name{font-size:14px;font-weight:700}
.bus-meta{font-size:12px;color:var(--muted);margin-top:2px}
.bus-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.bus-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;white-space:nowrap}
.bs-on{background:var(--green-light);color:var(--green)}
.bus-dist{font-size:12px;font-weight:700;color:var(--blue)}
.bus-eta{font-size:11px;color:var(--muted)}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:22px 10px;color:var(--muted);font-size:13px}
.empty-e{font-size:28px;margin-bottom:6px}
.refresh-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.refresh-btn{background:none;border:1.5px solid var(--border);border-radius:9px;padding:5px 11px;font-size:12px;font-family:'Cairo',sans-serif;color:var(--muted);cursor:pointer;transition:.2s}

/* ══ app-bar ══ */
.app-bar{

.install-btn{

  border:none;border-radius:10px;
  padding:12px 16px;

  flex:1;justify-content:center;
}
.install-btn:hover{background:#E3F2FD;}
.install-btn.installed{background:var(--green-light);color:var(--green);cursor:default}
.ios-hint{
  display:none;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);
  border-radius:10px;
  padding:6px 10px;
  font-size:11px;
  color:#fff;

.ios-hint.show{display:block}

/* ══ QR Fullscreen Overlay ══ */
#qrOverlay{

  background:rgba(0,0,0,.88);

#qrOverlay.show{display:flex;}

#qrBig canvas,#qrBig img{border-radius:8px;display:block;}

/* ══ PWA ══ */
let deferredPrompt = null;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  markInstalled();
});

function markInstalled(){
  const btn = document.getElementById('installBtn');
  document.getElementById('installBtnIcon').textContent = '✅';
  document.getElementById('installBtnTxt').textContent = T[lang].installedBtn;
  btn.classList.add('installed');
  btn.disabled = true;
  document.getElementById('iosHint').classList.remove('show');
}

async function triggerInstall(){
  if(isStandalone){ markInstalled(); return; }
  if(deferredPrompt){
    deferredPrompt.prompt();
    const choice = await deferredPrompt.userChoice;
    deferredPrompt = null;
    if(choice.outcome === 'accepted') markInstalled();
  } else if(isIOS){
    document.getElementById('iosHint').classList.toggle('show');
  }
}

function generateQR(){
  const box = document.getElementById('qrBox');
  box.innerHTML = '';
  const url = window.location.href.split('?')[0];
  try{
    new QRCode(box,{text:url,width:48,height:48,colorDark:'#1565C0',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    const big = document.getElementById('qrBig');
    big.innerHTML = '';
    new QRCode(big,{text:url,width:260,height:260,colorDark:'#1565C0',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  }catch(e){
    box.innerHTML='<div style="font-size:30px;line-height:48px;text-align:center">📱</div>';
  }
  box.onclick = () => document.getElementById('qrOverlay').classList.add('show');
}

function initAppCard(){
  generateQR();
  document.getElementById('iosHint').innerHTML = T[lang].iosHint;
  if(isStandalone){ markInstalled(); return; }
  if(isIOS){

}

  lang = l;
  const root = document.getElementById('htmlRoot');
  if(l==='ar'){ root.setAttribute('dir','rtl'); root.setAttribute('lang','ar'); }
  else { root.setAttribute('dir','ltr'); root.setAttribute('lang',l); }

  document.getElementById('cancelBtn').textContent = T[l].cancel;

  const hdrBtn = document.getElementById('hdrLocBtn');
  if(hdrBtn.classList.contains('ok')) document.getElementById('locBtnTxt').textContent = T[l].locOk;
  else if(hdrBtn.classList.contains('err')) document.getElementById('locBtnTxt').textContent = T[l].locErr;

  if(selectedRouteName){
    document.getElementById('busesTitle').innerHTML = T[l].busTitle+' &mdash; <span style="color:'+selectedColor+';font-weight:700">'+escH(selectedRouteName)+'</span>';

    document.getElementById('busesTitle').textContent = T[l].busTitle;

}

/* ═══════════════════════════════════════════════════
   تعديل ١: passengerId ثابت في localStorage
   بدلاً من إنشاء ID جديد في كل مرة
═══════════════════════════════════════════════════ */
let passengerId = localStorage.getItem('dolmus_passenger_id');
if(!passengerId){
  passengerId = 'p_' + Math.random().toString(36).substr(2,9);
  localStorage.setItem('dolmus_passenger_id', passengerId);

function sbGet(table,params=''){
  return fetch(`${SB_URL}/rest/v1/${table}${params}`,
    {headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}}).then(r=>r.json());
}
function calcDist(la1,lo1,la2,lo2){
  const R=6371000,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(m){return m<1000?Math.round(m)+'م':(m/1000).toFixed(1)+'كم';}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function nowTime(){return new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});}

/* ═══════════════════════════════════════════════════
   تعديل ٢: savePassengerLocation يرسل updated_at
   لتتبع آخر نشاط للراكب
═══════════════════════════════════════════════════ */
async function savePassengerLocation(lat,lng,routeName){
  try{
    await fetch(`${SB_URL}/rest/v1/passenger_locations`,{
      method:'POST',
      headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({
        id:passengerId,
        route_name:routeName||'',
        lat,lng,
        updated_at: new Date().toISOString()
      })
    });
  }catch(e){console.error(e);}
}

async function deletePassengerLocation(){
  try{
    await fetch(`${SB_URL}/rest/v1/passenger_locations?id=eq.${passengerId}`,{
      method:'DELETE',headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}
    });
  }catch(e){console.error(e);}
}

/* ═══════════════════════════════════════════════════
   تعديل ٣: إغلاق المتصفح — محاولة الحذف بكل الطرق
   visibilitychange + pagehide + beforeunload
═══════════════════════════════════════════════════ */
function tryDeleteOnExit(){
  if(!selectedRouteName) return;
  // الطريقة الأفضل على الموبايل: sendBeacon
  const url = `${SB_URL}/rest/v1/passenger_locations?id=eq.${passengerId}`;
  const sent = navigator.sendBeacon
    ? navigator.sendBeacon(url + '&_method=DELETE', new Blob(
        [JSON.stringify({})],
        {type:'application/json'}
      ))
    : false;
  // احتياطي: fetch مع keepalive
  if(!sent){
    fetch(url,{
      method:'DELETE',
      headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY},
      keepalive:true
    }).catch(()=>{});
  }
}

// عند إخفاء الصفحة (الموبايل يضغط الزر الرئيسي أو يغلق)
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState === 'hidden') tryDeleteOnExit();
});

// عند إغلاق أو تحديث المتصفح
window.addEventListener('pagehide', tryDeleteOnExit);
window.addEventListener('beforeunload', tryDeleteOnExit);

function getLocation(){
  const btn=document.getElementById('hdrLocBtn');
  btn.className='hdr-loc-btn loading';
  document.getElementById('locBtnTxt').textContent=T[lang].locating;
  if(!navigator.geolocation){btn.className='hdr-loc-btn err';document.getElementById('locBtnTxt').textContent=T[lang].locNo;return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{userLat=pos.coords.latitude;userLng=pos.coords.longitude;btn.className='hdr-loc-btn ok';document.getElementById('locBtnTxt').textContent=T[lang].locOk;initMap();},
    ()=>{btn.className='hdr-loc-btn err';document.getElementById('locBtnTxt').textContent=T[lang].locErr;},
    {enableHighAccuracy:true,timeout:12000}
  );
}

function initMap(){
  document.getElementById('routesCard').classList.remove('hidden');
  if(!map){
    map=L.map('map',{zoomControl:true,attributionControl:false}).setView([userLat,userLng],14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  }
  if(userMarker) userMarker.remove();
  const uIcon=L.divIcon({className:'',html:`<div style="width:16px;height:16px;background:#1565C0;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>`,iconSize:[16,16],iconAnchor:[8,8]});
  userMarker=L.marker([userLat,userLng],{icon:uIcon,zIndexOffset:1000}).addTo(map).bindPopup(T[lang].myLoc);
  loadRoutes();
}

async function loadRoutes(){
  document.getElementById('routesGrid').innerHTML='<div class="empty"><div class="empty-e">⏳</div>'+T[lang].loading+'</div>';
  try{
    const rows=await sbGet('routes','?select=id,route_name,direction,points,city&order=route_name');
    if(!Array.isArray(rows)||rows.length===0){document.getElementById('routesGrid').innerHTML='<div class="empty"><div class="empty-e">🚫</div>'+T[lang].noRoutes+'</div>';return;}
    const grouped={};
    rows.forEach(r=>{if(!grouped[r.route_name])grouped[r.route_name]=[];grouped[r.route_name].push(r);});
    Object.values(routePolylines).forEach(arr=>arr.forEach(l=>l&&l.remove&&l.remove()));
    routePolylines={};
    const bounds=[];
    Object.keys(grouped).forEach((rName,idx)=>{
      const color=COLORS[idx%COLORS.length];
      routeColorMap[rName]=color;routePolylines[rName]=[];
      grouped[rName].forEach(seg=>{
        const pts=seg.points||[];if(pts.length<2)return;
        const latlngs=pts.map(p=>[parseFloat(p.lat),parseFloat(p.lng)]);
        latlngs.forEach(p=>bounds.push(p));
        const poly=L.polyline(latlngs,{color,weight:5,opacity:.75,dashArray:seg.direction==='returning'?'10,8':null}).addTo(map);
        poly.on('click',()=>selectRoute(rName,color));routePolylines[rName].push(poly);
        const sd=L.circleMarker(latlngs[0],{radius:7,color:'#fff',weight:2,fillColor:color,fillOpacity:1}).addTo(map).bindPopup(`<b style="font-family:Cairo">${escH(rName)}</b><br>${seg.direction==='going'?T[lang].goStart:T[lang].retStart}`);
        routePolylines[rName].push(sd);
        const ed=L.circleMarker(latlngs[latlngs.length-1],{radius:7,color:'#fff',weight:2,fillColor:color,fillOpacity:1}).addTo(map).bindPopup(`<b style="font-family:Cairo">${escH(rName)}</b><br>${seg.direction==='going'?T[lang].goEnd:T[lang].retEnd}`);
        routePolylines[rName].push(ed);
      });
      const fs=grouped[rName].find(s=>s.direction==='going')||grouped[rName][0];
      const pts=fs.points||[];
      if(pts.length>0){
        const mid=pts[Math.floor(pts.length/2)];
        const lbl=L.divIcon({className:'',html:`<div style="background:${color};color:#fff;font-family:Cairo,sans-serif;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap;box-shadow:0 1px 5px rgba(0,0,0,.3)">${escH(rName)}</div>`,iconAnchor:[30,10]});
        routePolylines[rName].push(L.marker([parseFloat(mid.lat),parseFloat(mid.lng)],{icon:lbl,interactive:false}).addTo(map));
      }
    });
    if(bounds.length) map.fitBounds(bounds,{padding:[30,30]});
    renderRouteList(grouped);
  }catch(e){
    document.getElementById('routesGrid').innerHTML='<div class="empty"><div class="empty-e">❌</div>'+T[lang].noRouteErr+': '+escH(e.message)+'</div>';
  }
}

function renderRouteList(grouped){
  const grid=document.getElementById('routesGrid');
  const names=Object.keys(grouped);
  if(!names.length){grid.innerHTML='<div class="empty"><div class="empty-e">🚫</div>'+T[lang].noRoutes+'</div>';return;}
  grid.innerHTML=names.map(rName=>{
    const color=routeColorMap[rName]||'#1E88E5';
    const segs=grouped[rName];
    const isActive=selectedRouteName===rName;
    return `<button class="route-btn${isActive?' active':''}" id="rbtn-${CSS.escape(rName)}" onclick="selectRoute('${escH(rName).replace(/'/g,"\\'")}','${color}')">
      <div class="route-dot" style="background:${color}"></div>
      <div class="route-btn-info">
        <div class="route-btn-name">${escH(rName)}</div>
        <div class="route-btn-meta">
          ${segs.some(s=>s.direction==='going')?'<span class="direction-tab dir-go">'+T[lang].going+'</span>':''}
          ${segs.some(s=>s.direction==='returning')?'<span class="direction-tab dir-back">'+T[lang].returning+'</span>':''}
        </div>
      </div>
      <div class="route-badge ${isActive?'rb-active':'rb-idle'}" id="rbadge-${CSS.escape(rName)}">${isActive?T[lang].chosen:T[lang].choose}</div>
    </button>`;
  }).join('');
}

function selectRoute(rName,color){
  selectedRouteName=rName;selectedColor=color||routeColorMap[rName]||'#1E88E5';
  Object.entries(routePolylines).forEach(([name,layers])=>layers.forEach(l=>{if(!l||!l.setStyle)return;l.setStyle(name===rName?{weight:7,opacity:1}:{weight:3,opacity:.2});}));
  document.querySelectorAll('.route-btn').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.route-badge').forEach(el=>{el.className='route-badge rb-idle';el.textContent=T[lang].choose;});
  try{
    const btn=document.getElementById('rbtn-'+CSS.escape(rName));if(btn)btn.classList.add('active');
    const badge=document.getElementById('rbadge-'+CSS.escape(rName));if(badge){badge.className='route-badge rb-active';badge.textContent=T[lang].chosen;}
  }catch(e){}
  document.getElementById('busesTitle').innerHTML=T[lang].busTitle+' &mdash; <span style="color:'+selectedColor+';font-weight:700">'+escH(rName)+'</span>';
  document.getElementById('busesCard').classList.remove('hidden');
  document.getElementById('cancelBtn').classList.add('show');
  if(userLat&&userLng) savePassengerLocation(userLat,userLng,rName);

  /* ═══════════════════════════════════════════════════
     تعديل ٤: heartbeat كل 5 دقائق لتحديث updated_at
     يضمن أن الراكب النشط لا يُحذف تلقائياً
  ═══════════════════════════════════════════════════ */
  clearInterval(heartbeatInterval);
  heartbeatInterval = setInterval(()=>{
    if(userLat && userLng && selectedRouteName){
      savePassengerLocation(userLat, userLng, selectedRouteName);
    }
  }, 5 * 60 * 1000); // كل 5 دقائق

  clearInterval(busInterval);loadBuses();busInterval=setInterval(loadBuses,10000);
  setTimeout(()=>document.getElementById('busesCard').scrollIntoView({behavior:'smooth'}),300);
}

async function loadBuses(){
  if(!selectedRouteName) return;
  const list=document.getElementById('busesList');
  list.innerHTML='<div class="empty"><div class="empty-e">⏳</div>'+T[lang].loading+'</div>';
  busMarkers.forEach(m=>m.remove());busMarkers=[];
  try{
    const buses=await sbGet('live_locations',`?select=driver_name,route_name,lat,lng&route_name=eq.${encodeURIComponent(selectedRouteName)}`);
    document.getElementById('updateTime').textContent=T[lang].lastUpdate+nowTime()+' 🔄';
    const validBuses=(Array.isArray(buses)?buses:[]).filter(b=>{const la=parseFloat(b.lat),lo=parseFloat(b.lng);return !isNaN(la)&&!isNaN(lo)&&la!==0&&lo!==0;});
    if(!validBuses.length){list.innerHTML='<div class="empty"><div class="empty-e">😴</div>'+T[lang].noBuses+'</div>';return;}
    validBuses.forEach(b=>{
      const la=parseFloat(b.lat),lo=parseFloat(b.lng);
      const bIcon=L.divIcon({className:'bus-marker-icon',html:`<div style="display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:30px;line-height:1;filter:drop-shadow(0 2px 5px rgba(0,0,0,.5))">🚌</div><div style="background:#1565C0;color:#fff;font-family:Cairo,sans-serif;padding:3px 10px;border-radius:8px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.4);text-align:center;line-height:1.5;border:1.5px solid rgba(255,255,255,.5)"><div style="font-size:12px;font-weight:700">${escH(b.driver_name)}</div><div style="font-size:11px;font-weight:600;opacity:.9">${escH(b.route_name)}</div></div></div>`,iconSize:[130,72],iconAnchor:[65,34]});
      busMarkers.push(L.marker([la,lo],{icon:bIcon,zIndexOffset:500}).addTo(map).bindPopup(`<div style="font-family:Cairo;min-width:140px"><b>${escH(b.driver_name)}</b><br><span style="color:#607D8B;font-size:12px">${T[lang].lineLabel} ${escH(b.route_name)}</span></div>`));
    });
    if(busMarkers.length===1) map.setView([parseFloat(validBuses[0].lat),parseFloat(validBuses[0].lng)],15);
    else if(busMarkers.length>1) map.fitBounds(L.featureGroup(busMarkers).getBounds().pad(0.3));
    list.innerHTML=validBuses.map(b=>{
      const la=parseFloat(b.lat),lo=parseFloat(b.lng);
      const dist=userLat!=null?calcDist(userLat,userLng,la,lo):null;
      const mins=dist?Math.max(1,Math.round(dist/300)):null;
      return `<div class="bus-row"><div class="bus-icon">🚌</div><div class="bus-body"><div class="bus-name">${escH(b.driver_name)}</div><div class="bus-meta">${T[lang].lineLabel} <b>${escH(b.route_name)}</b></div></div><div class="bus-right"><div class="bus-status bs-on">${T[lang].moving}</div>${dist!==null?`<div class="bus-dist">${fmtDist(dist)}</div>`:''} ${mins?`<div class="bus-eta">~${mins} dk</div>`:''}</div></div>`;
    }).join('');
  }catch(e){
    list.innerHTML='<div class="empty"><div class="empty-e">❌</div>'+T[lang].connErr+': '+escH(e.message)+'</div>';
  }
}

window.addEventListener('load', initAppCard);
</script>
